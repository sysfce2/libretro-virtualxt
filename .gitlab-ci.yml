# DESCRIPTION: GitLab CI/CD for libRetro (NOT FOR GitLab-proper)

##############################################################################
################################# BOILERPLATE ################################
##############################################################################

# Core definitions
.core-defs:
  variables:
    MAKEFILE_PATH: tools/package/libretro
    CORENAME: virtualxt

# Inclusion templates, required for the build to work
include:
  ################################## DESKTOPS ################################
  # Windows 64-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/windows-x64-mingw.yml'

  # Windows msvc10 64-bit
  #- project: 'libretro-infrastructure/ci-templates'
  #  file: '/windows-x64-msvc10-msys2.yml'

  # Linux 64-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/linux-x64.yml'

  # MacOS 64-bit
  #- project: 'libretro-infrastructure/ci-templates'
  #  file: '/osx-x64.yml'

  # MacOS ARM 64-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/osx-arm64.yml'

  ################################## CELLULAR ################################
  # Android
  - project: 'libretro-infrastructure/ci-templates'
    file: '/android-make.yml'

  # iOS
  - project: 'libretro-infrastructure/ci-templates'
    file: '/ios-arm64.yml'

# Stages for building
stages:
  - build-prepare
  - build-shared
  - build-static

##############################################################################
#################################### STAGES ##################################
##############################################################################
#
################################### DESKTOPS #################################
# Windows 64-bit
libretro-build-windows-x64:
  only:
    - develop
    - edge
    - release
  extends:
    - .libretro-windows-x64-mingw-make-default
    - .core-defs

# Windows msvc10 64-bit
#libretro-build-windows-msvc10-x64:
#  only:
#    - edge
#    - release
#  extends:
#    - .libretro-windows-x64-msvc10-msys2-make-default
#    - .core-defs

# Linux 64-bit
libretro-build-linux-x64:
  only:
    - edge
    - release
  extends:
    - .libretro-linux-x64-make-default
    - .core-defs

# MacOS 64-bit
#libretro-build-osx-x64:
#  only:
#    - edge
#    - release
#  extends:
#    - .libretro-osx-x64-make-default
#    - .core-defs

# MacOS ARM 64-bit
libretro-build-osx-arm64:
  only:
    - edge
    - release
  extends:
    - .libretro-osx-arm64-make-default
    - .core-defs

################################### CELLULAR #################################
# Android ARMv7a
#android-armeabi-v7a:
#  only:
#    - edge
#    - release
#  extends:
#    - .libretro-android-make-armeabi-v7a
#    - .core-defs

# Android ARMv8a
android-arm64-v8a:
  only:
    - edge
    - release
  extends:
    - .libretro-android-make-arm64-v8a
    - .core-defs

# iOS
libretro-build-ios-arm64:
  only:
    - edge
    - release
  extends:
    - .libretro-ios-arm64-make-default
    - .core-defs
