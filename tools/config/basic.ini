[virtualxt]
version=1.3.0

[bios]
module=rom
name=BIOS
base=0xFE000
mem=bios/GLABIOS.ROM

[vxtx]
module=rom
name=Disk Extension
base=0xFD800
mem=bios/vxtx.bin

[chipset]
module=chipset

[ems]
module=ems

[mouse]
module=mouse

[vga]
module=vga

[vgabios]
module=rom
name=VGA BIOS
base=0xC0000
mem=bios/vgabios.bin

[disk]
module=disk
auto=boot/svardos_hd.img
boot=0x80
